name: build-win-exe

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build exe
        run: |
          pyinstaller --noconfirm --onefile --name mhxy-bot-win10 --add-data "app/ui;app/ui" --add-data "config;config" app/launcher.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mhxy-bot-win10-windows-exe
          path: dist/mhxy-bot-win10.exe
