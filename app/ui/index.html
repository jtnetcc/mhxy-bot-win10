<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>mhxy-bot-win10 Prototype</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header>
      <div>
        <h1>mhxy-bot-win10</h1>
        <p>Win10 单开版原型 · 打图 / 师门 / 抓鬼（队长）</p>
      </div>
      <div class="badge">V0.5 Ops Preview</div>
    </header>

    <section class="grid">
      <div class="card">
        <h2>窗口绑定</h2>
        <div class="status-row"><span>窗口状态</span><strong id="boundWindow">未绑定</strong></div>
        <div class="status-row"><span>当前任务</span><strong id="currentTask">空闲</strong></div>
        <div class="status-row"><span>运行状态</span><strong id="running">否</strong></div>
        <button onclick="act('bind')">绑定游戏窗口</button>
      </div>

      <div class="card">
        <h2>任务面板</h2>
        <div class="button-group">
          <button onclick="act('start-dig')">启动自动打图</button>
          <button onclick="act('start-master')">启动自动师门</button>
          <button onclick="act('start-ghost')">启动自动抓鬼（队长）</button>
        </div>
        <div class="button-group compact">
          <button class="secondary" onclick="act('pause')">暂停</button>
          <button class="danger" onclick="act('stop')">停止</button>
        </div>
      </div>

      <div class="card">
        <h2>巡线与战斗模拟</h2>
        <p>当前版本先演示流程和交互，后续再接真实识图与动作执行。</p>
        <div class="button-group compact">
          <button class="secondary" onclick="act('simulate-route')">模拟巡线</button>
          <button class="secondary" onclick="act('simulate-battle')">模拟战斗回链</button>
        </div>
      </div>

      <div class="card wide">
        <h2>配置中心</h2>
        <div class="section-grid two-col">
          <section class="panel">
            <h3>基础设置</h3>
            <div class="form-grid two-col">
              <label>窗口标题关键词<input id="title_keyword" /></label>
              <label>巡线模板<input id="route_profile" /></label>
              <label>停止热键<input id="stop_hotkey" /></label>
              <label>暂停热键<input id="pause_hotkey" /></label>
              <label>超时秒数<input id="timeout_seconds" type="number" min="10" /></label>
            </div>
          </section>
          <section class="panel">
            <h3>任务配置</h3>
            <div class="form-grid three-col compact-grid">
              <label>打图轮数<input id="dig_rounds" type="number" min="1" /></label>
              <label>师门轮数<input id="master_rounds" type="number" min="1" /></label>
              <label>抓鬼轮数<input id="ghost_rounds" type="number" min="1" /></label>
            </div>
            <div class="check-row vertical-checks">
              <label><input id="dig_enabled" type="checkbox" /> 启用自动打图</label>
              <label><input id="master_enabled" type="checkbox" /> 启用自动师门</label>
              <label><input id="ghost_enabled" type="checkbox" /> 启用自动抓鬼（队长）</label>
            </div>
          </section>
        </div>
        <div class="button-row right top-gap">
          <button onclick="saveConfig()">保存参数</button>
        </div>
      </div>

      <div class="card wide">
        <h2>调试与路线</h2>
        <div class="section-grid three-col">
          <section class="panel">
            <h3>OCR 调试区</h3>
            <div class="form-grid two-col compact-grid">
              <label>OCR X<input id="ocr_x" type="number" /></label>
              <label>OCR Y<input id="ocr_y" type="number" /></label>
              <label>OCR W<input id="ocr_w" type="number" /></label>
              <label>OCR H<input id="ocr_h" type="number" /></label>
            </div>
            <div class="debug-box" id="ocr_debug"></div>
          </section>
          <section class="panel">
            <h3>路线管理区</h3>
            <div class="debug-box tall" id="route_debug"></div>
          </section>
          <section class="panel">
            <h3>识别调试区</h3>
            <div class="debug-box tall" id="vision_debug"></div>
          </section>
        </div>
      </div>

      <div class="card wide">
        <h2>运行日志</h2>
        <pre id="logs"></pre>
      </div>
    </section>
  </div>
  <script src="app.js"></script>
</body>
</html>
